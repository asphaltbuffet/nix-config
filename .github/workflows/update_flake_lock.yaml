name: "update flake lock"
# https://forrestjacobs.com/keeping-nixos-systems-up-to-date-with-github-actions/
#
# Flow: update lock → build all hosts → open PR only on success.
# Merging the PR triggers autodeploy.yaml, which rebuilds and publishes store paths.

on:
  workflow_dispatch: # allows manual triggering
  schedule:
    # Every 3 days at 08:00 UTC (04:00 EDT / ~05:00 EST).
    # Scheduled for early morning ET so hosts are unlikely to be active
    # when autodeploy picks up the change. GitHub Actions has no timezone
    # support; the ~1hr DST drift is acceptable.
    - cron: '0 8 */3 * *'

permissions:
  contents: read

jobs:
  update:
    name: "update flake.lock"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      branch: ${{ steps.push.outputs.branch }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update flake.lock
        run: nix flake update

      - name: Push update branch
        id: push
        run: |
          branch="flake-lock-update-$(date +%Y%m%d)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add flake.lock
          if git diff --cached --quiet; then
            echo "No changes to flake.lock — nothing to do." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git commit -m "chore: update flake.lock"
          # Fetch the branch first so --force-with-lease has a tracking ref to compare
          # against. Without this, a fresh runner has no knowledge of the remote branch
          # and --force-with-lease refuses the push with "stale info" on same-day re-runs.
          git fetch origin "$branch" || true
          git push origin "$branch" --force-with-lease
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

  build:
    needs: update
    if: needs.update.outputs.branch != ''
    uses: ./.github/workflows/build-hosts.yaml
    with:
      ref: ${{ needs.update.outputs.branch }}
      publish-pages: false
      upload-store-path-for-diff: true
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      CACHIX_SIGNING_KEY: ${{ secrets.CACHIX_SIGNING_KEY }}

  diff:
    name: "generate package diff"
    needs: [update, build]
    if: needs.update.outputs.branch != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        # Intentionally checks out main (no ref: override) — we need to build the
        # main branch closure as the baseline for nix store diff-closures.
        # The update branch's store paths arrive via downloaded artifacts.

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-diff-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-diff-
          gc-max-store-size: 2000000000

      - uses: cachix/cachix-action@v15
        with:
          name: nix-config-grue
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ secrets.CACHIX_SIGNING_KEY }}

      - name: Download new store paths
        uses: actions/download-artifact@v4
        with:
          pattern: new-store-path-*
          merge-multiple: true
          path: /tmp/new-store-paths/

      - name: Build main branch closures and diff
        run: |
          mkdir -p /tmp/diffs
          touch /tmp/diffs/raw-all.txt

          for host in wendigo kushtaka snallygaster; do
            new_path=$(cat "/tmp/new-store-paths/new-store-path-${host}" 2>/dev/null || true)
            if [ -z "$new_path" ]; then
              echo "Skipping $host — no new store path artifact found"
              continue
            fi

            # Build main branch for this host (expected Cachix cache hit)
            main_path=$(nix build \
              ".#nixosConfigurations.${host}.config.system.build.toplevel" \
              --no-link \
              --print-out-paths)

            # Diff old (main) vs new (updated branch)
            nix store diff-closures "$main_path" "$new_path" \
              >> /tmp/diffs/raw-all.txt 2>/dev/null || true
          done

          # Deduplicate across hosts (same nixpkgs input → same changes on all hosts)
          sort -u /tmp/diffs/raw-all.txt > /tmp/diffs/deduped.txt

          # Count categories
          # diff-closures format: "pkg: ε → new" (added), "pkg: old → ε" (removed), "pkg: old → new" (changed)
          added=$(grep -c ' ε → ' /tmp/diffs/deduped.txt 2>/dev/null || echo 0)
          removed=$(grep -c ' → ε' /tmp/diffs/deduped.txt 2>/dev/null || echo 0)
          total=$(wc -l < /tmp/diffs/deduped.txt)
          changed=$((total - added - removed))

          # Write PR body fragment
          {
            echo "## Package changes"
            echo ""
            echo "**Added: ${added} | Removed: ${removed} | Changed: ${changed}**"
            echo ""
            echo "<details>"
            echo "<summary>Full diff</summary>"
            echo ""
            echo '```'
            cat /tmp/diffs/deduped.txt
            echo '```'
            echo ""
            echo "</details>"
          } > /tmp/pr-body-diff.md

      - name: Upload PR body diff fragment
        uses: actions/upload-artifact@v4
        with:
          name: pr-body
          path: /tmp/pr-body-diff.md

  open-pr:
    name: "open pull request"
    needs: [update, build, diff]
    if: needs.update.outputs.branch != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Download PR body diff fragment
        uses: actions/download-artifact@v4
        with:
          name: pr-body
          path: /tmp/pr-body/

      - name: Assemble PR body
        run: |
          {
            echo "Automated update of \`flake.lock\` inputs."
            echo ""
            echo "All hosts built successfully against this lock file."
            echo "Merging will trigger \`autodeploy.yaml\`, which publishes store paths for pickup by \`nixos-autodeploy\`."
          } > /tmp/full-pr-body.md

          # Append diff fragment if present
          if [ -f /tmp/pr-body/pr-body-diff.md ]; then
            echo "" >> /tmp/full-pr-body.md
            cat /tmp/pr-body/pr-body-diff.md >> /tmp/full-pr-body.md
          fi

      - name: Create or update pull request
        id: pr
        env:
          # Must use a PAT here — PRs opened with GITHUB_TOKEN do not trigger
          # workflow runs, so status checks never fire and branch protection
          # rules can never be satisfied. A PAT makes the PR appear user-initiated.
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          BRANCH: ${{ needs.update.outputs.branch }}
        run: |
          body=$(cat /tmp/full-pr-body.md)

          # Check for an existing PR on this branch (same-day re-run guard)
          existing_url=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --json url \
            --jq '.[0].url' 2>/dev/null || true)

          if [ -n "$existing_url" ]; then
            echo "PR already exists: $existing_url — updating body"
            gh pr edit "$existing_url" --body "$body"
            echo "url=$existing_url" >> "$GITHUB_OUTPUT"
          else
            pr_url=$(gh pr create \
              --title "chore: update flake.lock" \
              --body "$body" \
              --head "$BRANCH" \
              --base main)
            echo "url=$pr_url" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
        run: gh pr merge "${{ steps.pr.outputs.url }}" --auto --rebase
