name: "build hosts"
# Reusable workflow: build all NixOS hosts and push store paths to Cachix.
# Called by autodeploy.yaml, pr-check.yaml, and update_flake_lock.yaml.
# Store path artifacts are uploaded when publish-pages: true, for the caller to deploy.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out (default: caller's SHA)"
        type: string
        required: false
        default: ""
      publish-pages:
        description: "Upload store path artifacts for GitHub Pages publishing"
        type: boolean
        required: false
        default: false
      upload-store-path-for-diff:
        description: "Upload per-host store path artifacts for the diff job"
        type: boolean
        required: false
        default: false
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true
      CACHIX_SIGNING_KEY:
        required: true

permissions: {}

jobs:
  generate-matrix:
    name: "discover hosts"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hosts: ${{ steps.discover.outputs.hosts }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Discover hosts
        id: discover
        run: |
          # basename -a strips paths from all glob matches in one call;
          # jq wraps the newline-delimited names into a JSON array.
          hosts=$(basename -a nixos/hosts/*/ | jq -Rnc '[inputs]')
          echo "hosts=$hosts" >> "$GITHUB_OUTPUT"

  build:
    name: "build ${{ matrix.host }}"
    needs: generate-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.generate-matrix.outputs.hosts) }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      # Cache the Nix store in GitHub Actions cache keyed on flake.lock.
      # Primary key hits restore the full store; on miss the closest prefix match
      # is used as a warm starting point. gc-max-store-size keeps the cache under
      # GitHub's 10 GB per-repo limit.
      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ matrix.host }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ matrix.host }}-
          gc-max-store-size: 2000000000

      # cachix-action installs a Nix post-build hook that automatically pushes
      # all newly built store paths to the cache — no manual `cachix push` needed.
      - name: Install Cachix
        uses: cachix/cachix-action@v15
        with:
          name: nix-config-grue
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ secrets.CACHIX_SIGNING_KEY }}

      - name: Build ${{ matrix.host }}
        id: build
        env:
          HOST: ${{ matrix.host }}
        run: |
          # --print-out-paths emits the store path on stdout; capture it directly.
          # cachix-action's post-build hook pushes the path to the cache automatically.
          # HOST is passed via env to avoid expression injection into the shell script.
          store_path=$(nix build \
            ".#nixosConfigurations.${HOST}.config.system.build.toplevel" \
            --no-link \
            --print-out-paths)
          echo "store_path=${store_path}" >> "$GITHUB_OUTPUT"

      - name: Write new store path for diff job
        if: inputs.upload-store-path-for-diff
        env:
          HOST: ${{ matrix.host }}
          STORE_PATH: ${{ steps.build.outputs.store_path }}
        run: |
          printf '%s' "${STORE_PATH}" > "/tmp/new-store-path-${HOST}"

      - name: Upload new store path for diff job
        if: inputs.upload-store-path-for-diff
        uses: actions/upload-artifact@v4
        with:
          name: new-store-path-${{ matrix.host }}
          path: /tmp/new-store-path-${{ matrix.host }}

      - name: Write store path artifact
        if: inputs.publish-pages
        env:
          HOST: ${{ matrix.host }}
          STORE_PATH: ${{ steps.build.outputs.store_path }}
        run: |
          if [ -f ".autodeploy-skip/${HOST}" ]; then
            echo "${HOST} is in .autodeploy-skip — skipping store-path publish"
            exit 0
          fi
          mkdir -p "pages-artifact/hosts/${HOST}"
          # printf '%s' avoids echo -n portability issues across shells.
          printf '%s' "${STORE_PATH}" > "pages-artifact/hosts/${HOST}/store-path"

      - name: Upload pages fragment
        if: inputs.publish-pages
        uses: actions/upload-artifact@v4
        with:
          name: pages-${{ matrix.host }}
          path: pages-artifact/
          if-no-files-found: ignore
