name: "build hosts"
# Reusable workflow: build all NixOS hosts and push store paths to Cachix.
# Called by autodeploy.yml, pr-check.yml, and update_flake_lock.yaml.
# Store path artifacts are uploaded when publish-pages: true, for the caller to deploy.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out (default: caller's SHA)"
        type: string
        required: false
        default: ""
      publish-pages:
        description: "Upload store path artifacts for GitHub Pages publishing"
        type: boolean
        required: false
        default: false
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true
      CACHIX_SIGNING_KEY:
        required: true

permissions: {}

jobs:
  generate-matrix:
    name: "discover hosts"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hosts: ${{ steps.discover.outputs.hosts }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Discover hosts
        id: discover
        run: |
          # basename -a strips paths from all glob matches in one call;
          # jq wraps the newline-delimited names into a JSON array.
          hosts=$(basename -a nixos/hosts/*/ | jq -Rnc '[inputs]')
          echo "hosts=$hosts" >> "$GITHUB_OUTPUT"

  build:
    name: "build ${{ matrix.host }}"
    needs: generate-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.generate-matrix.outputs.hosts) }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # cachix-action installs a Nix post-build hook that automatically pushes
      # all newly built store paths to the cache — no manual `cachix push` needed.
      - name: Install Cachix
        uses: cachix/cachix-action@v15
        with:
          name: nix-config-grue
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ secrets.CACHIX_SIGNING_KEY }}

      - name: Build ${{ matrix.host }}
        id: build
        env:
          HOST: ${{ matrix.host }}
        run: |
          # --print-out-paths emits the store path on stdout; capture it directly.
          # cachix-action's post-build hook pushes the path to the cache automatically.
          # HOST is passed via env to avoid expression injection into the shell script.
          store_path=$(nix build \
            ".#nixosConfigurations.${HOST}.config.system.build.toplevel" \
            --no-link \
            --print-out-paths)
          echo "store_path=${store_path}" >> "$GITHUB_OUTPUT"

      - name: Write store path artifact
        if: inputs.publish-pages
        env:
          HOST: ${{ matrix.host }}
          STORE_PATH: ${{ steps.build.outputs.store_path }}
        run: |
          if [ -f ".autodeploy-skip/${HOST}" ]; then
            echo "${HOST} is in .autodeploy-skip — skipping store-path publish"
            exit 0
          fi
          mkdir -p "pages-artifact/hosts/${HOST}"
          # printf '%s' avoids echo -n portability issues across shells.
          printf '%s' "${STORE_PATH}" > "pages-artifact/hosts/${HOST}/store-path"

      - name: Upload pages fragment
        if: inputs.publish-pages
        uses: actions/upload-artifact@v4
        with:
          name: pages-${{ matrix.host }}
          path: pages-artifact/
          if-no-files-found: ignore
